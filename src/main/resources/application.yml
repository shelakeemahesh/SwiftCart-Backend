server:
  port: 8080
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - profile
  application:
    name: swiftcart-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test?useSSL=true&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USER:2Honwd66Qkukh9g.root}
    password: ${DATABASE_PASSWORD:01YlmXmCjdbhzqqc}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  hikari:
    minimum-idle: 5
    maximum-pool-size: 20
    connection-timeout: 30000
    idle-timeout: 600000
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:a044e5001@smtp-brevo.com}
    password: ${MAIL_PASSWORD:YOUR_BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: swiftcart-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLXN3aWZ0Y2FydC1iYWNrZW5kLXByb2plY3Qtc2hvdWxkLWJlLWF0LWxlYXN0LTUxMi1iaXRzLWxvbmc=}
  access-token-expiry-ms: 900000 # 15 minutes
  refresh-token-expiry-ms: 604800000 # 7 days

elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  uris: http://${elasticsearch.host}:${elasticsearch.port}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_mockkey}
    secret: ${RAZORPAY_KEY_SECRET:mocksecret}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:mockwebhooksecret}

aws:
  s3:
    bucket: ${S3_BUCKET:swiftcart-bucket}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false
    elasticsearch:
      enabled: false
    kafka:
      enabled: false

app:
  frontend:
    domain: ${FRONTEND_URL:http://localhost:5173}
  oauth2:
    authorizedRedirectUris: ${OAUTH2_REDIRECT_URIS:http://localhost:5173/oauth2/callback}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:YOUR_TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN:YOUR_TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER:YOUR_TWILIO_PHONE_NUMBER}
